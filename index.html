<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zé do Criatório</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- MENU LATERAL -->
    <aside class="sidebar">

        <div class="logo">
            <img src="img/logo.png" alt="Zé do Criatório">
        </div>

        <nav>

            <a class="ativo" href="#">
                <i class="fa-solid fa-house"></i>
                Início
            </a>

            <a href="#">
                <i class="fa-solid fa-dove"></i>
                Aves
            </a>

            <a href="#">
                <i class="fa-solid fa-heart"></i>
                Casais
            </a>

            <a href="#">
                <i class="fa-solid fa-egg"></i>
                Ninhadas
            </a>

            <a href="#">
                <i class="fa-solid fa-ring"></i>
                Anilhas
            </a>

            <a href="#">
                <i class="fa-solid fa-feather"></i>
                Filhotes
            </a>

            <a href="#">
                <i class="fa-solid fa-chart-column"></i>
                Relatórios
            </a>

            <a href="#">
                <i class="fa-solid fa-syringe"></i>
                Manejo
            </a>

            <a href="#">
                <i class="fa-solid fa-gear"></i>
                Configurações
            </a>

        </nav>

        <button class="sair">
            <i class="fa-solid fa-right-from-bracket"></i>
            Sair
        </button>

    </aside>

    <!-- CONTEÚDO -->
    <main class="conteudo">

        <!-- TOPO -->
        <header>

            <div class="titulo">
                <h1>Olá, Criador! 🌿</h1>
                <p>Bem-vindo ao painel do seu criatório.</p>
            </div>

            <img src="img/ze-banner.png" class="mascote">

        </header>

        <!-- CARDS -->
        <section class="cards">

            <div class="card">
                <i class="fa-solid fa-dove"></i>
                <h2>28</h2>
                <p>Aves Cadastradas</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-heart"></i>
                <h2>14</h2>
                <p>Casais Formados</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-egg"></i>
                <h2>9</h2>
                <p>Ninhadas</p>
            </div>

            <div class="card">
                <i class="fa-regular fa-circle"></i>
                <h2>42</h2>
                <p>Anilhas</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-feather"></i>
                <h2>36</h2>
                <p>Filhotes</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-chart-column"></i>
                <h2>12</h2>
                <p>Relatórios</p>
            </div>

        </section>

        <!-- GRÁFICOS -->
        <section class="graficos">

            <div class="grafico">

                <h2>Nascimentos (este mês)</h2>

                <div class="numero">
                    28
                </div>

                <div class="linha"></div>

            </div>

            <div class="grafico">

                <h2>Aves cadastradas</h2>

                <div class="numero azul">
                    142
                </div>

                <div class="pizza"></div>

            </div>

        </section>

    </main>

</body>

</html>
